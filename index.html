<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root{
  --void:    #02020A;
  --ink:     #080818;
  --surface: #0D0D20;
  --lift:    #13132B;
  --veil:    #1A1A38;

  /* Accent system — acid + warm */
  --acid:    #C8FF00;   /* electric lime — primary CTA */
  --acid-dim: rgba(200,255,0,0.12);
  --acid-glow: rgba(200,255,0,0.25);
  --violet:  #7B61FF;
  --violet-dim: rgba(123,97,255,0.15);
  --violet-glow: rgba(123,97,255,0.3);
  --rose:    #FF4D6D;
  --rose-dim: rgba(255,77,109,0.15);
  --amber:   #FFAA00;
  --amber-dim: rgba(255,170,0,0.15);
  --teal:    #00E5CC;
  --teal-dim: rgba(0,229,204,0.15);

  /* Priority colors */
  --p-high:   var(--rose);
  --p-high-d: var(--rose-dim);
  --p-mid:    var(--amber);
  --p-mid-d:  var(--amber-dim);
  --p-low:    var(--teal);
  --p-low-d:  var(--teal-dim);

  /* Text */
  --t1: rgba(255,255,255,0.95);
  --t2: rgba(255,255,255,0.50);
  --t3: rgba(255,255,255,0.25);

  /* Motion */
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --smooth: cubic-bezier(0.25,0.46,0.45,0.94);
  --out:    cubic-bezier(0.16,1,0.3,1);

  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
}

/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;font-size:16px;-webkit-text-size-adjust:100%;}
body{
  min-height:100%;
  font-family:'Space Grotesk',sans-serif;
  background:var(--void);
  color:var(--t1);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-top:var(--sat);
  padding-bottom:calc(var(--sab) + 80px);
  overscroll-behavior:none;
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

/* ═══════════════════════════════════════════════
   CANVAS LAYERS
═══════════════════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#particle-canvas{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0;}

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--violet);border-radius:99px;}

/* ═══════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════ */
#app{
  position:relative;z-index:10;
  max-width:480px;margin:0 auto;
  min-height:100vh;display:flex;flex-direction:column;
  padding:0 18px 24px;
}

/* ═══════════════════════════════════════════════
   HERO HEADER — editorial, not a card
═══════════════════════════════════════════════ */
#hero{
  padding:20px 4px 0;
  margin-bottom:6px;
  position:relative;
}

.hero-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:0;
}

.hero-wordmark{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,20vw,96px);
  line-height:0.85;
  letter-spacing:-0.02em;
  /* Split color fill — half white, half violet */
  background: linear-gradient(170deg,
    #fff 0%, #fff 48%,
    var(--violet) 52%, var(--violet) 100%
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  user-select:none;
}

.hero-meta{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  padding-top:8px;
}

.hero-date{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t3);
}

/* Live sync pill */
.sync-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;
  border-radius:99px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.08em;
  text-transform:uppercase;
  border:1px solid transparent;
  transition:all 0.3s var(--smooth);
}
.sync-pill.online  {background:rgba(0,229,204,0.08);border-color:rgba(0,229,204,0.2);color:var(--teal);}
.sync-pill.offline {background:rgba(255,170,0,0.08); border-color:rgba(255,170,0,0.2); color:var(--amber);}
.sync-pill.syncing {background:rgba(123,97,255,0.08);border-color:rgba(123,97,255,0.2);color:var(--violet);}
.sync-pill.error   {background:rgba(255,77,109,0.08); border-color:rgba(255,77,109,0.2); color:var(--rose);}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sync-dot.blink{animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* Progress bar — horizontal ticker under wordmark */
.hero-progress-track{
  width:100%;height:3px;
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  margin-top:12px;
  overflow:hidden;
  position:relative;
}
.hero-progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--violet),var(--acid));
  border-radius:99px;
  transition:width 0.7s var(--smooth);
  position:relative;
}
.hero-progress-fill::after{
  content:'';
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;
  background:#fff;
  box-shadow:0 0 8px 2px var(--acid);
}

/* ═══════════════════════════════════════════════
   TICKER STRIP — replaces boring stat cards
═══════════════════════════════════════════════ */
#ticker{
  display:flex;
  gap:0;
  margin:16px 0 20px;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  overflow:hidden;
  background:var(--surface);
}
.ticker-item{
  flex:1;
  padding:14px 12px;
  display:flex;flex-direction:column;gap:3px;
  position:relative;
}
.ticker-item+.ticker-item{
  border-left:1px solid rgba(255,255,255,0.05);
}
.ticker-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;line-height:1;
  color:var(--t1);
  transition:color 0.3s;
}
.ticker-label{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--t3);
}
.ticker-item.accent-done .ticker-num{color:var(--acid);}
.ticker-accent-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:transparent;
  transition:background 0.3s;
}
.ticker-item.accent-done .ticker-accent-bar{background:var(--acid);}
.ticker-item.accent-left .ticker-accent-bar{background:var(--violet);}

/* ═══════════════════════════════════════════════
   ADD TASK — brutalist input row
═══════════════════════════════════════════════ */
#add-zone{
  margin-bottom:16px;
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  overflow:hidden;
  transition:border-color 0.2s;
}
#add-zone:focus-within{border-color:rgba(123,97,255,0.4);}

.input-row{
  display:flex;align-items:center;
  padding:6px 6px 6px 18px;
  gap:10px;
}
#task-input{
  flex:1;
  background:transparent;
  border:none;outline:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:500;
  color:var(--t1);
  padding:10px 0;
}
#task-input::placeholder{color:var(--t3);}

#add-btn{
  width:44px;height:44px;
  border-radius:12px;
  border:none;cursor:pointer;
  background:var(--acid);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:transform 0.18s var(--spring),box-shadow 0.2s;
  box-shadow:0 0 20px var(--acid-glow);
}
#add-btn:hover{transform:scale(1.08);box-shadow:0 0 32px var(--acid-glow);}
#add-btn:active{transform:scale(0.92);}
#add-btn svg{width:18px;height:18px;stroke:#000;stroke-width:3;fill:none;stroke-linecap:round;}

/* Priority row */
.priority-row{
  display:flex;
  border-top:1px solid rgba(255,255,255,0.05);
}
.p-btn{
  flex:1;padding:10px 0;
  border:none;background:transparent;cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--t3);
  transition:all 0.18s var(--smooth);
  position:relative;
}
.p-btn+.p-btn{border-left:1px solid rgba(255,255,255,0.05);}
.p-btn::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:transparent;transition:background 0.2s;
}
.p-btn[data-p="high"]{color:rgba(255,77,109,0.5);}
.p-btn[data-p="mid"] {color:rgba(255,170,0,0.5);}
.p-btn[data-p="low"] {color:rgba(0,229,204,0.5);}
.p-btn[data-p="high"].active{color:var(--rose);background:rgba(255,77,109,0.06);}
.p-btn[data-p="high"].active::after{background:var(--rose);}
.p-btn[data-p="mid"].active {color:var(--amber);background:rgba(255,170,0,0.06);}
.p-btn[data-p="mid"].active::after{background:var(--amber);}
.p-btn[data-p="low"].active {color:var(--teal);background:rgba(0,229,204,0.06);}
.p-btn[data-p="low"].active::after{background:var(--teal);}

/* ═══════════════════════════════════════════════
   FILTER ROW — minimal pills, not a panel
═══════════════════════════════════════════════ */
#filters{
  display:flex;gap:6px;
  margin-bottom:18px;
  padding:0 2px;
}
.f-pill{
  padding:6px 14px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:99px;
  background:transparent;
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:500;
  color:var(--t3);
  cursor:pointer;
  transition:all 0.18s var(--smooth);
  white-space:nowrap;
}
.f-pill.active{
  background:var(--violet-dim);
  border-color:rgba(123,97,255,0.4);
  color:#fff;
}
.f-pill:hover:not(.active){border-color:rgba(255,255,255,0.15);color:var(--t2);}

/* ═══════════════════════════════════════════════
   TASK LIST
═══════════════════════════════════════════════ */
#task-list{display:flex;flex-direction:column;gap:8px;flex:1;}

/* Empty state */
#empty{
  display:none;
  padding:64px 0;
  text-align:center;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
#empty.show{display:flex;}
.empty-glyph{
  font-family:'Bebas Neue',sans-serif;
  font-size:80px;line-height:1;
  color:rgba(255,255,255,0.04);
  letter-spacing:-0.04em;
  user-select:none;
}
.empty-label{font-size:13px;color:var(--t3);letter-spacing:0.04em;}

/* ═══════════════════════════════════════════════
   TASK CARD — editorial layout
═══════════════════════════════════════════════ */
.task-card{
  position:relative;
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.055);
  border-radius:16px;
  overflow:hidden;
  cursor:default;
  transition:border-color 0.2s,transform 0.15s var(--smooth);
}
.task-card:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-1px);}

/* Left priority stripe */
.task-card::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:3px;
  transition:background 0.3s;
}
.task-card[data-p="high"]::before{background:var(--rose);box-shadow:4px 0 12px rgba(255,77,109,0.4);}
.task-card[data-p="mid"]::before {background:var(--amber);box-shadow:4px 0 12px rgba(255,170,0,0.4);}
.task-card[data-p="low"]::before {background:var(--teal);box-shadow:4px 0 12px rgba(0,229,204,0.4);}

.card-inner{
  padding:14px 14px 14px 20px;
  display:flex;align-items:flex-start;gap:12px;
}

/* Checkbox */
.c-box{
  flex-shrink:0;
  width:20px;height:20px;
  border-radius:6px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-top:2px;
  transition:all 0.2s var(--smooth);
  position:relative;
}
.task-card[data-p="high"] .c-box{border-color:rgba(255,77,109,0.4);}
.task-card[data-p="mid"]  .c-box{border-color:rgba(255,170,0,0.4);}
.task-card[data-p="low"]  .c-box{border-color:rgba(0,229,204,0.4);}
.c-box svg{width:10px;height:10px;stroke:#000;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(0.4);transition:all 0.2s var(--spring);}
.c-box .ck{stroke-dasharray:14;stroke-dashoffset:14;transition:stroke-dashoffset 0.3s var(--smooth);}

.task-card.done .c-box{background:var(--acid);border-color:transparent;box-shadow:0 0 14px rgba(200,255,0,0.4);}
.task-card.done .c-box svg{opacity:1;transform:scale(1);}
.task-card.done .c-box .ck{stroke-dashoffset:0;}

/* Text area */
.c-body{flex:1;min-width:0;}
.c-text{
  font-size:14px;font-weight:500;line-height:1.4;
  color:var(--t1);
  word-break:break-word;
  transition:color 0.25s,opacity 0.25s;
}
.task-card.done .c-text{
  text-decoration:line-through;
  color:var(--t3);
}
.c-foot{
  display:flex;align-items:center;gap:8px;
  margin-top:5px;
}
.c-priority{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;letter-spacing:0.14em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
}
.task-card[data-p="high"] .c-priority{color:var(--rose);background:var(--rose-dim);}
.task-card[data-p="mid"]  .c-priority{color:var(--amber);background:var(--amber-dim);}
.task-card[data-p="low"]  .c-priority{color:var(--teal);background:var(--teal-dim);}
.c-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--t3);}

/* Action buttons — appear on hover */
.c-actions{
  display:flex;flex-direction:column;gap:4px;
  opacity:0;transform:translateX(4px);
  transition:all 0.18s var(--smooth);
  flex-shrink:0;
}
.task-card:hover .c-actions,.task-card:focus-within .c-actions{opacity:1;transform:translateX(0);}
.act{
  width:28px;height:28px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s var(--smooth);
  color:var(--t3);
}
.act svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.act.e:hover{background:var(--violet-dim);border-color:rgba(123,97,255,0.4);color:var(--violet);}
.act.d:hover{background:var(--rose-dim);border-color:rgba(255,77,109,0.3);color:var(--rose);}

/* Inline edit input */
.inline-edit{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--violet);
  outline:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--t1);
  padding:2px 0 4px;
}

/* Remote flash */
@keyframes rfx{0%{background:rgba(123,97,255,0.18);}100%{background:var(--surface);}}
.task-card.rfx{animation:rfx 0.9s var(--smooth) forwards;}

/* ═══════════════════════════════════════════════
   VOICE FAB — the Meridian wake button
═══════════════════════════════════════════════ */
#voice-fab{
  position:fixed;
  bottom:calc(var(--sab) + 28px);
  left:50%;transform:translateX(-50%);
  z-index:500;

  width:64px;height:64px;
  border-radius:50%;
  border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--violet) 0%,#5B3FFF 100%);
  display:flex;align-items:center;justify-content:center;

  box-shadow:
    0 0 0 0 rgba(123,97,255,0),
    0 8px 32px rgba(123,97,255,0.4);
  transition:transform 0.2s var(--spring),box-shadow 0.2s;
}
#voice-fab:hover{transform:translateX(-50%) scale(1.08);}
#voice-fab:active{transform:translateX(-50%) scale(0.93);}
#voice-fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* Listening pulse rings */
#voice-fab.listening{
  box-shadow:
    0 0 0 12px rgba(123,97,255,0.15),
    0 0 0 24px rgba(123,97,255,0.07),
    0 8px 32px rgba(123,97,255,0.5);
  animation:listenPulse 1.6s ease-in-out infinite;
}
@keyframes listenPulse{
  0%,100%{box-shadow:0 0 0 8px rgba(123,97,255,0.2),0 0 0 16px rgba(123,97,255,0.08),0 8px 32px rgba(123,97,255,0.5);}
  50%    {box-shadow:0 0 0 16px rgba(123,97,255,0.12),0 0 0 28px rgba(123,97,255,0.04),0 8px 32px rgba(123,97,255,0.5);}
}
#voice-fab.listening svg{stroke:var(--acid);}

/* ═══════════════════════════════════════════════
   VOICE MODAL — wake word UI
═══════════════════════════════════════════════ */
#voice-modal{
  position:fixed;inset:0;z-index:800;
  display:flex;align-items:flex-end;
  background:rgba(2,2,10,0.7);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s var(--smooth);
}
#voice-modal.open{opacity:1;pointer-events:all;}

.voice-sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.08);
  border-bottom:none;
  border-radius:24px 24px 0 0;
  padding:28px 24px calc(var(--sab) + 40px);
  transform:translateY(100%);
  transition:transform 0.4s var(--spring);
}
#voice-modal.open .voice-sheet{transform:translateY(0);}

.vs-handle{
  width:36px;height:4px;border-radius:99px;
  background:rgba(255,255,255,0.12);
  margin:0 auto 24px;
}
.vs-status{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--violet);
  margin-bottom:10px;
}
.vs-transcript{
  font-family:'Space Grotesk',sans-serif;
  font-size:22px;font-weight:600;line-height:1.3;
  color:var(--t1);
  min-height:60px;
  margin-bottom:20px;
  position:relative;
}
.vs-transcript .cursor{
  display:inline-block;
  width:2px;height:1.1em;
  background:var(--acid);
  margin-left:3px;
  vertical-align:text-bottom;

/* ═══════════════════════════════════════════════
   GENERATIVE BACKGROUND — flowing orbs on canvas
═══════════════════════════════════════════════ */
(function initBG(){
  const c  = document.getElementById('bg-canvas');
  const cx = c.getContext('2d');
  let W,H;

  const orbs = [
    { x:.15, y:.2, r:.35, hue:260, speed:.0004 },
    { x:.85, y:.15, r:.3, hue:220, speed:.0003 },
    { x:.5,  y:.7, r:.4, hue:280, speed:.0005 },
    { x:.1,  y:.8, r:.25, hue:240, speed:.0006 },
    { x:.9,  y:.75, r:.28, hue:200, speed:.0004 },
  ];

  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  window.addEventListener('resize',resize); resize();

  let t=0;
  (function draw(){
    cx.clearRect(0,0,W,H);
    // Deep base
    cx.fillStyle='#02020A';cx.fillRect(0,0,W,H);

    orbs.forEach(o=>{
      const ox = (o.x + Math.sin(t*o.speed*1.3)*0.08)*W;
      const oy = (o.y + Math.cos(t*o.speed)*0.08)*H;
      const rad = o.r * Math.min(W,H);
      const g = cx.createRadialGradient(ox,oy,0,ox,oy,rad);
      g.addColorStop(0,`hsla(${o.hue},70%,30%,0.12)`);
      g.addColorStop(1,`hsla(${o.hue},70%,30%,0)`);
      cx.fillStyle=g;
      cx.beginPath();cx.arc(ox,oy,rad,0,Math.PI*2);cx.fill();
    });

    // Subtle grid
    cx.strokeStyle='rgba(255,255,255,0.018)';
    cx.lineWidth=1;
    const step=80;
    for(let x=0;x<W;x+=step){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=step){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}

    t++;
    requestAnimationFrame(draw);
  })();
})();

/* ═══════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════ */
const Particles=(()=>{
  let pts=[],aid;
  const ctx=D.canvas.getContext('2d');
  const COLS=['#C8FF00','#7B61FF','#FF4D6D','#FFAA00','#00E5CC','#fff'];
  return {
    burst(){
      D.canvas.width=innerWidth;D.canvas.height=innerHeight;
      pts=[];
      const N=Math.min(innerWidth<480?70:140,160);
      for(let i=0;i<N;i++) pts.push({
        x:Math.random()*D.canvas.width,
        y:Math.random()*D.canvas.height*0.6,
        vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*12-6,
        r:Math.random()*5+2,
        color:COLS[Math.floor(Math.random()*COLS.length)],
        a:1,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*0.18,
        sq:Math.random()>.5
      });
      D.canvas.style.opacity=1;
      cancelAnimationFrame(aid);
      (function draw(){
        ctx.clearRect(0,0,D.canvas.width,D.canvas.height);
        let alive=0;
        pts.forEach(p=>{
          p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.vx*=0.99;
          p.a=Math.max(0,p.a-.009);p.rot+=p.rv;
          if(p.a<=0)return;alive++;
          ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;
          if(p.sq)ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
          else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
          ctx.restore();
        });
        if(alive>0)aid=requestAnimationFrame(draw);
        else D.canvas.style.opacity=0;
      })();
    }
  };
})();

/* ═══════════════════════════════════════════════

/* ═══════════════════════════════════════════════

function updateStats(){
  const total=S.tasks.length;
  const done=S.tasks.filter(t=>t.done).length;

  D.tTotal.textContent=total;

  D.tLeft.textContent=total-done;

  S.prevPct=pct;
}

/* ═══════════════════════════════════════════════
   FILTER
═══════════════════════════════════════════════ */
function filtered(){
  switch(S.filter){
    case'active': return S.tasks.filter(t=>!t.done);
    case'done':   return S.tasks.filter(t=> t.done);
    case'high':   return S.tasks.filter(t=>t.priority==='high');
    default:      return S.tasks;

/* ═══════════════════════════════════════════════

function buildCard(task){

        </button>
        <button class="act d" aria-label="Delete">

  return el;
}

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function render(entrance=false){
  const list=filtered();
  [...D.list.children].forEach(c=>{if(c.id!=='empty')c.remove();});
  if(!list.length){D.empty.classList.add('show');}
  else{D.empty.classList.remove('show');}
  const els=[];
  list.forEach(task=>{
    const el=buildCard(task);
    D.list.appendChild(el);
    els.push(el);
  });
  if(entrance&&els.length){
    gsap.fromTo(els,{opacity:0,y:16,scale:.97},
      {opacity:1,y:0,scale:1,duration:.45,stagger:.065,ease:'power3.out',clearProps:'opacity,transform'});
  }
  updateStats();
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════ */
function animAdd(el){
  gsap.set(el,{opacity:0,scaleY:0,transformOrigin:'top center',height:0});
  el.style.height='auto';
  const h=el.getBoundingClientRect().height;
  el.style.height='0px';
  gsap.timeline()
    .to(el,{height:h,duration:.3,ease:'power2.out'})
    .to(el,{scaleY:1,opacity:1,duration:.25,ease:'back.out(1.4)'},'-=0.08')
    .set(el,{height:'auto',clearProps:'transform'});
}

function animRemove(el,cb){
  const sibs=[...el.parentElement.children].filter(c=>c!==el&&c.id!=='empty');
  const rects=sibs.map(s=>s.getBoundingClientRect());
  gsap.to(el,{opacity:0,scaleX:.9,scaleY:0,height:0,marginBottom:0,
    duration:.28,ease:'power3.in',
    onComplete:()=>{
      el.remove();cb&&cb();
      sibs.forEach((s,i)=>{
        if(!s.isConnected)return;
        const dy=rects[i].top-s.getBoundingClientRect().top;
        if(Math.abs(dy)<1)return;
        gsap.fromTo(s,{y:dy},{y:0,duration:.35,ease:'power3.out',clearProps:'transform'});
      });
    }
  });
}

function animToggle(el,done){
  const box=el.querySelector('.c-box');
  const path=el.querySelector('.ck');
  const text=el.querySelector('.c-text');
  if(done){
    gsap.timeline()
      .to(box,{scale:1.3,duration:.1,ease:'power2.out'})
      .to(box,{scale:1,duration:.28,ease:'back.out(2)'});
    if(path){path.style.strokeDashoffset='14';
      setTimeout(()=>{path.style.transition='stroke-dashoffset 0.3s ease';path.style.strokeDashoffset='0';},80);}
    gsap.to(text,{opacity:.3,duration:.3});
  } else {
    if(path){path.style.transition='stroke-dashoffset 0.15s';path.style.strokeDashoffset='14';}
    gsap.to(text,{opacity:1,duration:.25});
  }
}

  async all(){ const{data,error}=await sb.from(TABLE).select('*').order('created_at',{ascending:false}); if(error)throw error; return data; },
  async insert(t){ const{error}=await sb.from(TABLE).insert({id:t.id,text:t.text,priority:t.priority,done:false,created_at:t.created_at}); if(error)throw error; },
  async update(id,ch){ const{error}=await sb.from(TABLE).update(ch).eq('id',id); if(error)throw error; },
  async remove(id){ const{error}=await sb.from(TABLE).delete().eq('id',id); if(error)throw error; }
};

/* ═══════════════════════════════════════════════
   REALTIME
═══════════════════════════════════════════════ */
function subscribeRT(){
  sb.channel('tasks-rt').on('postgres_changes',{event:'*',schema:'public',table:TABLE},p=>{
    const{eventType,new:nw,old}=p;

    if(eventType==='INSERT'){
      if(S.tasks.find(t=>t.id===nw.id))return;
      S.tasks.unshift(nw);Cache.save(S.tasks);render();
      const el=D.list.querySelector(`[data-id="${nw.id}"]`);
      if(el){animAdd(el);setTimeout(()=>{el.classList.add('rfx');setTimeout(()=>el.classList.remove('rfx'),900);},300);}
      toast('📡 Task synced from another device');
    }
    if(eventType==='UPDATE'){
      const i=S.tasks.findIndex(t=>t.id===nw.id);if(i===-1)return;
      S.tasks[i]={...S.tasks[i],...nw};Cache.save(S.tasks);
      const el=D.list.querySelector(`[data-id="${nw.id}"]`);
      if(el){
        const tx=el.querySelector('.c-text');if(tx)tx.textContent=nw.text;
        el.classList.toggle('done',nw.done);
        el.classList.add('rfx');setTimeout(()=>el.classList.remove('rfx'),900);
      }
      updateStats();
    }
    if(eventType==='DELETE'){
      if(!S.tasks.find(t=>t.id===old.id))return;
      S.tasks=S.tasks.filter(t=>t.id!==old.id);Cache.save(S.tasks);
      const el=D.list.querySelector(`[data-id="${old.id}"]`);
      if(el)animRemove(el,()=>updateStats());else updateStats();
    }
  }).subscribe(status=>{
    if(status==='SUBSCRIBED'){S.online=true;setSyncState('online','Live sync');}
  });
}

/* ═══════════════════════════════════════════════
   CRUD ACTIONS
═══════════════════════════════════════════════ */
async function doAdd(text,priority){
  text=text.trim();if(!text)return;
  const task={id:uid(),text,priority:priority||S.priority,done:false,created_at:new Date().toISOString()};
  S.tasks.unshift(task);Cache.save(S.tasks);
  render();
  const el=D.list.querySelector(`[data-id="${task.id}"]`);if(el)animAdd(el);
  gsap.timeline().to(D.addBtn,{scale:.88,duration:.1}).to(D.addBtn,{scale:1,duration:.3,ease:'back.out(2)'});
  toast('✓ Task added');
  if(S.online){try{await DB.insert(task);}catch{toast('⚠ Saved locally',3000);}}
}

async function doToggle(id,el){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  task.done=!task.done;Cache.save(S.tasks);
  el.classList.toggle('done',task.done);
  animToggle(el,task.done);updateStats();
  if(S.online){try{await DB.update(id,{done:task.done});}catch{}}
}

async function doDelete(id,el){
  animRemove(el,async()=>{
    S.tasks=S.tasks.filter(t=>t.id!==id);Cache.save(S.tasks);updateStats();
    toast('🗑 Deleted');
    if(S.online){try{await DB.remove(id);}catch{}}
  });
}

async function doEdit(id,el){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const tx=el.querySelector('.c-text');const orig=task.text;
  const inp=document.createElement('input');
  inp.className='inline-edit';inp.value=orig;inp.maxLength=200;
  tx.replaceWith(inp);inp.focus();inp.select();
  async function commit(){
    const nv=inp.value.trim()||orig;
    const p=document.createElement('p');p.className='c-text';p.textContent=nv;
    if(task.done)p.style.textDecoration='line-through';
    inp.replaceWith(p);
    if(nv!==orig){task.text=nv;Cache.save(S.tasks);toast('✎ Updated');
      if(S.online){try{await DB.update(id,{text:nv});}catch{}}}
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){inp.value=orig;inp.blur();}});
}

/* ═══════════════════════════════════════════════
   EVENT DELEGATION
═══════════════════════════════════════════════ */
D.list.addEventListener('click',e=>{
  const card=e.target.closest('.task-card');if(!card)return;
  const id=card.dataset.id;
  if(e.target.closest('.c-box'))doToggle(id,card);
  else if(e.target.closest('.act.e'))doEdit(id,card);
  else if(e.target.closest('.act.d'))doDelete(id,card);
});

D.addBtn.addEventListener('click',()=>doAdd(D.input.value));
D.input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAdd(D.input.value);D.input.value='';}});

// Priority tabs
D.pBtns.forEach(b=>b.addEventListener('click',()=>{
  D.pBtns.forEach(x=>x.classList.remove('active'));b.classList.add('active');S.priority=b.dataset.p;
}));

// Filter pills
D.filters.addEventListener('click',e=>{
  const pill=e.target.closest('.f-pill');if(!pill)return;
  document.querySelectorAll('.f-pill').forEach(p=>{p.classList.remove('active');p.setAttribute('aria-selected','false');});
  pill.classList.add('active');S.filter=pill.dataset.f;render();
});

/* ═══════════════════════════════════════════════
   VOICE SYSTEM
   Wake word: "Meridian" → opens modal → mic records task
   → user sets priority → confirm → doAdd()
═══════════════════════════════════════════════ */
const Voice=(()=>{
  // State
  let recognition=null;
  let wakeListening=false;
  let taskListening=false;
  let vsPriority='high';
  let vsTaskText='';

  // Check support
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ console.warn('SpeechRecognition not supported'); return {init(){}}; }

  // Modal priority selector
  D.vsPBtns.forEach(b=>b.addEventListener('click',()=>{
    D.vsPBtns.forEach(x=>x.classList.remove('sel'));b.classList.add('sel');vsPriority=b.dataset.p;
  }));

  // Close / cancel
  function closeModal(){
    D.vModal.classList.remove('open');
    D.vsText.textContent='';D.vsCursor.style.display='';
    D.vsConfirm.disabled=true;
    D.vsStatus.textContent='Listening…';
    vsTaskText='';
    stopTaskListen();
  }

  D.vsCancel.addEventListener('click',closeModal);
  D.vModal.addEventListener('click',e=>{ if(e.target===D.vModal)closeModal(); });

  // Confirm
  D.vsConfirm.addEventListener('click',()=>{
    if(!vsTaskText.trim())return;
    doAdd(vsTaskText,vsPriority);
    closeModal();
    toast(`🎤 "${vsTaskText}" added`);
  });

  /* ── TASK RECOGNITION ── */
  let taskRec=null;
  function startTaskListen(){
    taskListening=true;
    D.vsStatus.textContent='Speak your task…';
    D.vsCursor.style.display='inline-block';

    taskRec=new SR();
    taskRec.continuous=true;
    taskRec.interimResults=true;
    taskRec.lang='en-US';

    taskRec.onresult=e=>{
      let interim='',final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      const display=vsTaskText+final||interim||vsTaskText;
      D.vsText.textContent=display;
      if(final){ vsTaskText=(vsTaskText+final).trim(); D.vsText.textContent=vsTaskText; }
      D.vsConfirm.disabled=!vsTaskText.trim();
    };

    taskRec.onerror=e=>{
      if(e.error==='no-speech') D.vsStatus.textContent='No speech — try again';
      else D.vsStatus.textContent='Mic error: '+e.error;
    };

    taskRec.onend=()=>{
      if(taskListening&&vsTaskText){
        D.vsStatus.textContent='Done — set priority and confirm';
        D.vsCursor.style.display='none';
      }
    };

    taskRec.start();
  }

  function stopTaskListen(){
    taskListening=false;
    try{taskRec&&taskRec.stop();}catch{}taskRec=null;
  }

  /* ── OPEN MODAL ── */
  function openVoiceModal(){
    vsTaskText='';
    D.vsText.textContent='';
    D.vsConfirm.disabled=true;
    D.vModal.classList.add('open');
    D.vsPBtns.forEach(b=>{b.classList.remove('sel');if(b.dataset.p==='high')b.classList.add('sel');});
    vsPriority='high';
    // Small delay so animation starts first
    setTimeout(startTaskListen,350);
  }

  /* ── WAKE WORD RECOGNITION ── */
  let wakeRec=null;
  function startWakeListen(){
    if(!SR)return;
    wakeRec=new SR();
    wakeRec.continuous=true;
    wakeRec.interimResults=true;
    wakeRec.lang='en-US';

    wakeRec.onresult=e=>{
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript.toLowerCase().trim();
        // Flexible matching — catches "meridian", "meridiem", "Meridian", etc.
        if(/mer[iy]di[ae]n|meridian|meridiem/.test(t)){
          stopWakeListen();
          openVoiceModal();
          return;
        }
      }
    };

    wakeRec.onend=()=>{
      // Auto-restart unless we intentionally stopped
      if(wakeListening) setTimeout(startWakeListen,500);
    };

    wakeRec.onerror=e=>{
      // Only restart on non-fatal errors
      if(e.error==='no-speech'||e.error==='aborted') return;
      console.warn('Wake rec error:',e.error);
    };

    wakeListening=true;
    try{ wakeRec.start(); }catch{}
  }

  function stopWakeListen(){
    wakeListening=false;
    try{wakeRec&&wakeRec.stop();}catch{}wakeRec=null;
  }

  /* ── FAB BUTTON — manual trigger ── */
  D.fabBtn.addEventListener('click',()=>{
    if(D.vModal.classList.contains('open')){closeModal();return;}
    openVoiceModal();
    // Pulse FAB
    gsap.timeline()
      .to(D.fabBtn,{scale:.88,duration:.1})
      .to(D.fabBtn,{scale:1.1,duration:.25,ease:'back.out(2)'})
      .to(D.fabBtn,{scale:1,duration:.2});
  });

  return {
    init(){
      // Start wake word listening after 1s
      setTimeout(()=>{
        startWakeListen();
        // Show hint briefly
        D.voiceHint.classList.add('show');
        setTimeout(()=>D.voiceHint.classList.remove('show'),3500);
      },1200);
    }
  };
})();

/* ─── KEYBOARD SHORTCUT ─────────────────────── */
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();D.input.focus();D.input.select();}
  if(e.key==='Escape'&&document.getElementById('voice-modal').classList.contains('open')){
    document.getElementById('vs-cancel').click();
  }
});

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
async function boot(){
  D.heroDate.textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();

  // 1. Instant local render
  S.tasks=Cache.load();
  render(true);
  setSyncState('syncing','Connecting');

  // 2. Fetch remote
  try{
    const remote=await DB.all();
    S.tasks=remote;Cache.save(remote);
    render(false);
    setSyncState('online','Live sync');
    subscribeRT();
  }catch(err){
    console.warn('Supabase:',err);
    setSyncState('offline','Offline mode');
  }

  // 3. Voice
  Voice.init();
}

boot();

/* ─── SERVICE WORKER ──────────────────────── */
if('serviceWorker' in navigator){
  const sw=`const C='mrd-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
